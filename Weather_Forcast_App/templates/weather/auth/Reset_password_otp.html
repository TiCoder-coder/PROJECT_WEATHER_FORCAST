{% load static i18n_tags %}
<!DOCTYPE html>
<html lang="{{ lang }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% t "auth.reset_password_otp.page_title" %}</title>
  <link rel="stylesheet" href="{% static 'weather/css/Auth.css' %}?v=299002">
</head>
<body class="auth-page">
  <div class="auth-bg">
    <div class="auth-particles"></div>
    <div class="auth-gradient"></div>
    <div class="floating-shapes">
      <div class="shape shape-1"></div>
      <div class="shape shape-2"></div>
      <div class="shape shape-3"></div>
    </div>
  </div>

  <div class="auth-container">
    <div class="auth-card glass-effect">
      <div class="auth-header">
        <div class="auth-logo-wrapper">
          <div class="auth-logo">
            <span class="logo-dot pulse-dot"></span>
            <span class="logo-text">VN Weather Hub</span>
          </div>
        </div>
        <div class="icon-wrapper-large">
          <div class="icon-circle-gradient">
            <div class="icon-inner">
              <svg class="lock-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M19 11H5C3.89543 11 3 11.8954 3 13V20C3 21.1046 3.89543 22 5 22H19C20.1046 22 21 21.1046 21 20V13C21 11.8954 20.1046 11 19 11Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M7 11V7C7 5.67392 7.52678 4.40215 8.46447 3.46447C9.40215 2.52678 10.6739 2 12 2C13.3261 2 14.5979 2.52678 15.5355 3.46447C16.4732 4.40215 17 5.67392 17 7V11" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </div>
          </div>
        </div>
        <h1 class="auth-title">{% t "auth.reset_password_otp.title" %}</h1>
        <p class="auth-subtitle">{% t "auth.reset_password_otp.subtitle" %}</p>
      </div>

      {% if messages %}
        <div class="auth-messages">
          {% for message in messages %}
            <div class="auth-alert auth-alert-{{ message.tags }}">{{ message }}</div>
          {% endfor %}
        </div>
      {% endif %}

      <form method="post" action="{% url 'weather:reset_password_otp' %}" class="auth-form">
        {% csrf_token %}
        <div class="form-group animated-input">
          <label class="form-label">{% t "auth.reset_password_otp.new_password_label" %}</label>
          <div class="input-wrapper">
            <input type="password" name="new_password" class="form-input" required minlength="8" autocomplete="new-password">
            <span class="input-border"></span>
          </div>
        </div>

        <div class="form-group animated-input">
          <label class="form-label">{% t "auth.reset_password_otp.confirm_label" %}</label>
          <div class="input-wrapper">
            <input type="password" name="confirm_password" class="form-input" required minlength="8" autocomplete="new-password">
            <span class="input-border"></span>
          </div>
        </div>

        <button class="btn btn-primary btn-full btn-glow" type="submit">
          <span class="btn-text">{% t "auth.reset_password_otp.submit" %}</span>
        </button>
      </form>
    </div>
  </div>

  <div class="wx-layer wx-clouds" aria-hidden="true"></div>
  <div class="wx-layer wx-rain" aria-hidden="true"></div>
  <div class="wx-lightning-subtle" aria-hidden="true"></div>
</body>
</html>
